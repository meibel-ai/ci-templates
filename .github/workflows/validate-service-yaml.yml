name: Validate service.yaml

on:
  workflow_call:
    # No inputs required — validates service.yaml at repo root.
    # Schema version is tied to the ci-templates ref used to call this workflow.
    secrets:
      MEIBEL_DEPLOY_APP_ID:
        required: true
      MEIBEL_DEPLOY_APP_PRIVATE_KEY:
        required: true

jobs:
  validate:
    name: Validate service.yaml
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check service.yaml exists
        run: |
          if [ ! -f service.yaml ]; then
            echo "ERROR: service.yaml not found at repo root." >&2
            echo "Copy schemas/service.yaml.example from ci-templates to get started." >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.11'

      - name: Install validation tools
        run: pip install check-jsonschema pyyaml --quiet

      - name: Get GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.MEIBEL_DEPLOY_APP_ID }}
          private-key: ${{ secrets.MEIBEL_DEPLOY_APP_PRIVATE_KEY }}
          repositories: ci-templates

      - name: Fetch schema from ci-templates
        run: |
          # Schema version is pinned to the ci-templates ref that called this workflow
          SCHEMA_URL="https://raw.githubusercontent.com/meibel-ai/ci-templates/${{ github.action_ref }}/schemas/service.schema.json"
          curl -sf -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
            "$SCHEMA_URL" -o service.schema.json
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Validate schema
        run: check-jsonschema --schemafile service.schema.json service.yaml

      # ── Hard rule 1: rayservice + progressive canary conflict ────────────────
      # KubeRay reconciles its own pods — Argo Rollouts targeting the same pods
      # causes a reconciliation storm. Reject at CI, not at deploy time.
      - name: Check rayservice/progressive conflict
        run: |
          python3 - <<'EOF'
          import yaml, sys
          doc = yaml.safe_load(open("service.yaml"))
          spec = doc.get("spec", {})
          framework = spec.get("runtime", {}).get("framework", "standard")
          progressive = spec.get("deployment", {}).get("progressive", False)
          if framework == "rayservice" and progressive:
              print("ERROR: runtime.framework=rayservice is incompatible with deployment.progressive=true.", file=sys.stderr)
              print("KubeRay manages its own pod lifecycle. Argo Rollouts + KubeRay causes reconciliation chaos.", file=sys.stderr)
              sys.exit(1)
          print("OK: no rayservice/progressive conflict.")
          EOF

      # ── Hard rule 2: deployment.targets must be present and non-empty ────────
      # ApplicationSet generators key off targets — missing field means the
      # service will never be routed to any cluster.
      - name: Check deployment.targets present
        run: |
          python3 - <<'EOF'
          import yaml, sys
          doc = yaml.safe_load(open("service.yaml"))
          targets = doc.get("spec", {}).get("deployment", {}).get("targets", [])
          if not targets:
              print("ERROR: spec.deployment.targets is required and must list at least one cluster.", file=sys.stderr)
              print("Known clusters: dev-gcp, dev-aws, staging, prod-gcp, prod-aws, hub-dev, hub", file=sys.stderr)
              sys.exit(1)
          print(f"OK: deployment.targets = {targets}")
          EOF
